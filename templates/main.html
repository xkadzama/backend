<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport">
    <title>Главная</title>
</head>
<body>
<h1>Главная страница</h1>
{% if current_user.is_authenticated %}
    <a href="{{ url_for('auth.logout') }}">Выйти из аккаунта</a>
{% else %}
    <a href="{{ url_for('auth.login') }}">Войти в аккаунт</a>
    <a href="{{ url_for('auth.register') }}">Регистрация</a>
{% endif %}
</body>
</html>
