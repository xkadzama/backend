<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% if task_one %}
    <h1>{{ task_one.0.title }}</h1>
    <p>{{ task_one.0.description }}</p>
    <form action="{{ url_for('tasks.delete_task', id=task_one.0.id) }}" method="POST">
        <button>Удалить</button>
    </form>
{% else %}
    <h1>404 Page not found</h1>
{% endif %}
</body>
</html>
